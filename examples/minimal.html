<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>

<!--
  Minimal example: one slide, basic styling.
  This is the simplest possible SlideSmith input.
-->
<div class="slide" style="
  width: 1920px; height: 1080px;
  background: #1e293b;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  font-family: Arial, sans-serif; color: white;
">
  <h1 style="font-size: 72px; font-weight: 800;">Hello, SlideSmith</h1>
  <p style="font-size: 28px; color: #94a3b8; margin-top: 20px;">
    This text is fully editable in PowerPoint.
  </p>
</div>

</body>
</html>
